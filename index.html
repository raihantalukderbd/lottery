<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Spin Lottery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="lottery-page">
    <section class="lottery-hero" aria-label="Neon Spin lottery wheel">
      <header class="hero-header">
        <h1>NEON SPIN</h1>
        <p>Spin the wheel and land on one mapped lottery code.</p>
      </header>

      <div class="wheel-stage">
        <div class="pointer" aria-hidden="true"></div>

        <div class="wheel-wrap">
          <div class="wheel" id="lotteryWheel" aria-label="Lottery wheel with values 1 to 12">
            <div class="wheel-label prize gold" style="--a: 15deg; --r: 0deg;">
              <span class="label-number">1</span>
              <span class="label-code">TF</span>
            </div>
            <div class="wheel-label prize" style="--a: 45deg; --r: 0deg;">
              <span class="label-number">2</span>
              <span class="label-code">EF</span>
            </div>
            <div class="wheel-label prize gold" style="--a: 75deg; --r: 0deg;">
              <span class="label-number">3</span>
              <span class="label-code">NO</span>
            </div>
            <div class="wheel-label prize" style="--a: 105deg; --r: 180deg;">
              <span class="label-number">4</span>
              <span class="label-code">ET</span>
            </div>
            <div class="wheel-label prize gold" style="--a: 135deg; --r: 180deg;">
              <span class="label-number">5</span>
              <span class="label-code">BG</span>
            </div>
            <div class="wheel-label prize" style="--a: 165deg; --r: 180deg;">
              <span class="label-number">6</span>
              <span class="label-code">ER</span>
            </div>
            <div class="wheel-label prize gold" style="--a: 195deg; --r: 180deg;">
              <span class="label-number">7</span>
              <span class="label-code">ET</span>
            </div>
            <div class="wheel-label prize" style="--a: 225deg; --r: 180deg;">
              <span class="label-number">8</span>
              <span class="label-code">MO</span>
            </div>
            <div class="wheel-label prize gold" style="--a: 255deg; --r: 180deg;">
              <span class="label-number">9</span>
              <span class="label-code">ML</span>
            </div>
            <div class="wheel-label prize" style="--a: 285deg; --r: 0deg;">
              <span class="label-number">10</span>
              <span class="label-code">A</span>
            </div>
            <div class="wheel-label prize gold" style="--a: 315deg; --r: 0deg;">
              <span class="label-number">11</span>
              <span class="label-code">MS</span>
            </div>
            <div class="wheel-label prize" style="--a: 345deg; --r: 0deg;">
              <span class="label-number">12</span>
              <span class="label-code">ED</span>
            </div>

            <div class="hub" aria-hidden="true">
              <span>★</span>
            </div>
          </div>
        </div>
      </div>

      <button class="spin-button" id="spinButton" type="button">
        <span id="spinButtonText">SPIN NOW</span>
      </button>

      <div class="result-panel" aria-live="polite">
        <span class="result-label">Selected Value</span>
        <strong id="resultValue">--</strong>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
