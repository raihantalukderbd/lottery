<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Spin Lottery 1 to 12</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="lottery-page">
    <section class="lottery-hero" aria-label="Neon Spin lottery wheel">
      <header class="hero-header">
        <h1>NEON SPIN</h1>
        <p>Spin the wheel and land on a number from 1 to 12.</p>
      </header>

      <div class="wheel-stage">
        <div class="pointer" aria-hidden="true"></div>

        <div class="wheel-wrap">
          <div class="wheel" id="lotteryWheel" aria-label="Lottery wheel with values 1 to 12">
            <div class="wheel-label prize gold" style="--a: 15deg; --r: 0deg;">1</div>
            <div class="wheel-label prize" style="--a: 45deg; --r: 0deg;">2</div>
            <div class="wheel-label prize gold" style="--a: 75deg; --r: 0deg;">3</div>
            <div class="wheel-label prize" style="--a: 105deg; --r: 180deg;">4</div>
            <div class="wheel-label prize gold" style="--a: 135deg; --r: 180deg;">5</div>
            <div class="wheel-label prize" style="--a: 165deg; --r: 180deg;">6</div>
            <div class="wheel-label prize gold" style="--a: 195deg; --r: 180deg;">7</div>
            <div class="wheel-label prize" style="--a: 225deg; --r: 180deg;">8</div>
            <div class="wheel-label prize gold" style="--a: 255deg; --r: 180deg;">9</div>
            <div class="wheel-label prize" style="--a: 285deg; --r: 0deg;">10</div>
            <div class="wheel-label prize gold" style="--a: 315deg; --r: 0deg;">11</div>
            <div class="wheel-label prize" style="--a: 345deg; --r: 0deg;">12</div>

            <div class="hub" aria-hidden="true">
              <span>★</span>
            </div>
          </div>
        </div>
      </div>

      <button class="spin-button" id="spinButton" type="button">
        <span id="spinButtonText">SPIN NOW</span>
      </button>

      <div class="result-panel" aria-live="polite">
        <span class="result-label">Selected Value</span>
        <strong id="resultValue">--</strong>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
